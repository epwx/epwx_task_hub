<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPWX Task Hub Maintenance</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.82);
      --border: rgba(148, 163, 184, 0.22);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent-soft: rgba(245, 158, 11, 0.14);
      --glow: rgba(34, 211, 238, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(14, 165, 233, 0.2), transparent 40%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.14), transparent 35%),
        linear-gradient(180deg, #020617 0%, #111827 100%);
    }

    .panel {
      width: min(100%, 760px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 32px;
      background: var(--panel);
      box-shadow: 0 30px 80px var(--glow);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(245, 158, 11, 0.25);
      background: var(--accent-soft);
      color: #fcd34d;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 24px 0 16px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.05;
    }

    p {
      margin: 0 auto;
      max-width: 42rem;
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .note {
      margin-top: 18px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">Maintenance Mode</div>
    <h1>EPWX Task Hub is temporarily unavailable.</h1>
    <p>We are deploying an update right now. Please check back in a few minutes.</p>
    <p class="note">Your wallet, reward, and campaign data are not affected.</p>
  </main>
</body>
</html>
