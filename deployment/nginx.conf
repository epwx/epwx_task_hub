# Frontend - tasks.epowex.com
server {
    listen 80;
    server_name tasks.epowex.com www.tasks.epowex.com;

    location /_next/static/ {
        alias __APP_ROOT__/frontend/.next/static/;
        access_log off;
        expires 1h;
    }

    location = /maintenance.html {
        root __APP_ROOT__/frontend/public;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /favicon.ico {
        root __APP_ROOT__/frontend/public;
        access_log off;
    }

    location = /logo.webp {
        root __APP_ROOT__/frontend/public;
        access_log off;
    }
    
    error_page 502 503 504 @frontend_maintenance;

    location @frontend_maintenance {
        root __APP_ROOT__/frontend/public;
        try_files /maintenance.html =503;
    }

    location / {
        if (-f __APP_ROOT__/frontend/.maintenance) {
            return 503;
        }

        proxy_intercept_errors on;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tasks.epowex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasks.epowex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Backend API - api.epowex.com
server {
    listen 80;
    server_name api.epowex.com;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.epowex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.epowex.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
